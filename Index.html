<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatic Schedule Maker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container fade-in">
        <h1>Automatic Schedule Maker</h1>

        <!-- Step 1: Grade level selection -->
        <div id="step1" class="step fade-in">
            <h2>What Grade Level Are You Creating a Schedule For?</h2>
            <select id="gradeLevel">
                <option value="">Select Grade Level</option>
                <option value="Grade 1">Grade 1</option>
                <option value="Grade 2">Grade 2</option>
                <option value="Grade 3">Grade 3</option>
                <option value="Grade 4">Grade 4</option>
                <option value="Grade 5">Grade 5</option>
                <option value="Grade 6">Grade 6</option>
                <option value="Grade 7">Grade 7</option>
                <option value="Grade 8">Grade 8</option>
                <option value="Grade 9">Grade 9</option>
                <option value="Grade 10">Grade 10</option>
                <option value="Grade 11">Grade 11</option>
                <option value="Grade 12">Grade 12</option>
            </select>
            <button id="createScheduleBtn">Create Schedule!</button>
        </div>
        <!-- Credit Text -->
        <div class="credits">
            <p>Made It By: Charles Jaycee L. Grico</p>
        </div>

        <!-- Step 2: Schedule inputs -->
        <div id="step2" class="step fade-in" style="display: none;">
            <h2>Creating Schedule for: <span id="selectedGrade"></span></h2>
            <div class="input-row">
                <input type="text" id="subject" placeholder="Subject">
                <input type="text" id="teacher" placeholder="Teacher">
                <select id="day">
                    <option value="">Choose Day</option>
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                </select>

                <!-- Time start and end inputs -->
                <div class="time-inputs">
                    <input type="time" id="startTime" placeholder="Start Time">
                    <span>to</span>
                    <input type="time" id="endTime" placeholder="End Time">
                </div>
            </div>
            <button id="addScheduleBtn">Add to Schedule!</button>

            <!-- Schedule table -->
            <div id="scheduleTableContainer">
                <table id="scheduleTable">
                    <thead>
                        <tr>
                            <th>Class Name</th>
                            <th>Teacher</th>
                            <th>Monday</th>
                            <th>Tuesday</th>
                            <th>Wednesday</th>
                            <th>Thursday</th>
                            <th>Friday</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <!-- Pop-up Notification for Conflict Detection -->
            <div id="popup" class="popup" style="display: none;">
                <div class="popup-content">
                    <h3>Schedule Conflict Detected!!!</h3>
                    <p>Occupied by:</p>
                    <p>Time slot <span id="popupTimeSlot"></span></p>
                    <p>Teacher: <span id="popupTeacher"></span></p>
                    <p>Subject: <span id="popupSubject"></span></p>
                    <button id="closePopupBtn">OK</button>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
